<!DOCTYPE html>
<html>
<head>
<title>My Cart</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}

.header{
background:#2874f0;color:white;padding:15px;text-align:center;font-size:22px;
}

.container{max-width:900px;margin:auto;padding:15px;}

.item{
display:flex;gap:15px;background:white;padding:15px;margin-bottom:15px;
border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);align-items:center;
}

.item img{width:80px;height:80px;object-fit:cover;border-radius:8px;}

.item-details{flex:1;}

.price{color:green;font-weight:bold;}

button{
padding:6px 10px;border:none;border-radius:5px;cursor:pointer;margin:2px;
}

.remove-btn{background:red;color:white;}
.action-btn{background:#2874f0;color:white;}

.qty-btn{
background:#333;color:white;width:30px;
}

.footer{
background:white;padding:15px;border-top:1px solid #ccc;
position:sticky;bottom:0;
}

.total{font-size:20px;font-weight:bold;}

@media(max-width:600px){
.item{flex-direction:column;text-align:center;}
}
</style>

</head>
<body>

<div class="header">🛒 My Cart</div>

<div class="container">

<div id="cartItems"></div>

<h3 id="total"></h3>

<button class="action-btn" onclick="clearCart()">Clear Cart 🗑️</button>
<button class="action-btn" onclick="window.location.href='products.html'">Continue Shopping 🛍️</button>

</div>

<div class="footer">
<span class="total" id="footerTotal"></span>
<button class="action-btn" onclick="payNow()">Proceed to Pay 💳</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCart(){

 let html = "";
 let total = 0;

 cart.forEach((p,index)=>{

  html += `
   <div class="item">
     <img src="${p.image}">
     
     <div class="item-details">
       <h3>${p.name}</h3>
       <p class="price">₹${p.price} × ${p.qty || 1}</p>

       <button class="qty-btn" onclick="changeQty(${index},1)">+</button>
       <button class="qty-btn" onclick="changeQty(${index},-1)">-</button>
     </div>

     <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
   </div>
  `;

  total += p.price * (p.qty || 1);
 });

 document.getElementById("cartItems").innerHTML =
  html || "<h3>Your cart is empty 😢</h3>";

 document.getElementById("total").innerText = "Total: ₹" + total;
 document.getElementById("footerTotal").innerText = "₹" + total;

 window.totalAmount = total;
}

// CHANGE QTY
function changeQty(index,val){
 cart[index].qty = (cart[index].qty || 1) + val;

 if(cart[index].qty <= 0){
   cart.splice(index,1);
 }

 localStorage.setItem("cart", JSON.stringify(cart));
 loadCart();
}

// REMOVE
function removeItem(index){
 cart.splice(index,1);
 localStorage.setItem("cart", JSON.stringify(cart));
 loadCart();
}

// CLEAR
function clearCart(){
 localStorage.removeItem("cart");
 cart = [];
 loadCart();
}

// PAYMENT
function payNow(){

 if(!window.totalAmount || window.totalAmount == 0){
   alert("Cart is empty ❌");
   return;
 }

 let options = {
   "key": "YOUR_RAZORPAY_KEY",
   "amount": window.totalAmount * 100,
   "currency": "INR",
   "name": "My Shop",
   "description": "Cart Payment",
   "handler": function (){
     alert("Payment Successful ✅");
     localStorage.removeItem("cart");
     window.location.href = "success.html";
   }
 };

 let rzp = new Razorpay(options);
 rzp.open();
}

loadCart();

</script>

</body>
</html>
