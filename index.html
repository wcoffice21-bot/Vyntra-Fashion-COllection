<!DOCTYPE html>
<html>
<head>
<title>MyShop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
<script src="js/app.js" defer></script>
<style>
    body{
margin:0;
padding:0;
overflow-x:hidden;  /* THIS FIXES MOBILE */
}
.slider{
position:relative;
height:60vh;
overflow:hidden;
z-index:1;
}

/* IMPORTANT */
.categories,
.grid,
footer{
position:relative;
z-index:2;
background:white;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transform:scale(1.1);
z-index:0;
transition: opacity 1s ease-in-out, transform 1.5s ease-in-out;
transform: scale(1.1);
will-change: opacity, transform;
}

.slide.active{
opacity:1;
transform:scale(1);
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}


/* OVERLAY */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
background:linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.6));
text-align:center;
}

.overlay h2{
font-size:32px;
margin-bottom:10px;
}

.overlay p{
font-size:18px;
margin-bottom:15px;
}

.overlay button{
padding:10px 20px;
border:none;
background:#ff4d4d;
color:white;
cursor:pointer;
border-radius:5px;
}


/* HEADER */
header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
background:#ff4d4d;   /* apna color yaha likho */
color:white;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* LOGO */
.logo-box{
display:flex;
align-items:center;
gap:10px;
}

.logo{height:45px;}

.logo-text{
font-weight:bold;
font-size:16px;
color:yellow;   /* apna color */
}

/* SEARCH */
.search-box input{
padding:8px;
width:200px;
border-radius:5px;
border:1px solid #ccc;
}

/* RIGHT */
.right-section{
display:flex;
align-items:center;
gap:15px;
}

/* CART */
.cart{
cursor:pointer;
font-size:18px;
}

/* DARK BUTTON */
.dark-btn{
border:none;
padding:5px 10px;
cursor:pointer;
}

/* NAV */
.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
text-decoration:none;
color:#333;
font-weight:bold;
}
/* HAMBURGER */
.menu-toggle{
display:none;
font-size:25px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
    header{
flex-direction:column;
align-items:flex-start;
}
.nav-links{
width:100%;
left:0;
}
.search-box{
display:block;
width:100%;
margin-top:10px;
}
.search-box input{
width:100%;
}

.nav-links{
position:absolute;
top:60px;
right:0;
background:white;
flex-direction:column;
width:200px;
display:none;
padding:20px;
}

.nav-links.show{
display:flex;
}

.menu-toggle{
display:block;
}

}
.dark{
background:#111;
color:white;
}

.dark header{
background:#222;
}

.dark .nav-links a{
color:white;
}

.logo-text{font-size:16px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
gap:20px;
padding:20px;
}
.search-box{
position:relative;
}

.search-icon{
position:absolute;
left:8px;
top:50%;
transform:translateY(-50%);
font-size:14px;
}

.search-box input{
padding:8px 8px 8px 30px;
}

.categories{
display:flex;
overflow-x:auto;
gap:15px;
padding:15px;
background:#fff;
}

.cat{
min-width:80px;
text-align:center;
cursor:pointer;
padding:10px;
border-radius:10px;
background:#f5f5f5;
transition:0.3s;
}

.cat:hover{
background:#ddd;
}

.cat p{
font-size:12px;
margin-top:5px;
}
.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
text-align:center;
animation: fadeIn 0.5s ease;
}
.card img{
width:100%;
border-radius:10px;
}
</style>
</head>
<body>

<header>

<!-- LEFT -->
<div class="logo-box">
    <img src="images/logo.png" class="logo">
    <span class="logo-text">Maharani Sahib</span>
</div>

<!-- SEARCH -->
<div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search products...">
</div>
<!-- RIGHT -->
<div class="right-section">

<!-- CART -->
<div class="cart">
    🛒 <span id="cart-count">0</span>
</div>

<!-- DARK MODE -->
<button onclick="toggleDark()" class="dark-btn">🌙</button>

<!-- MENU BUTTON -->
<div class="menu-toggle" onclick="toggleMenu()">☰</div>

</div>

<!-- NAV LINKS -->
<nav class="nav-links" id="navLinks">
<a href="index.html">Home</a>
<a href="pages/products.html">Shop</a>
<a href="pages/services.html">Services</a>
<a href="pages/about.html">About</a>
<a href="pages/contact.html">Contact</a>
<a href="pages/cart.html">Cart</a>
<a href="pages/login.html">Login</a>
</nav>

</header>
<!-- SLIDER -->
<div class="slider">

  <div class="slide active" style="background-image:url('https://picsum.photos/id/1015/1200/600')">
    <div class="overlay">
      <h2>Big Sale 🔥</h2>
      <p>Up to 50% OFF</p>
      <button>Shop Now</button>
    </div>
  </div>

  <div class="slide" style="background-image:url('https://picsum.photos/id/1016/1200/600')">
    <div class="overlay">
      <h2>New Collection 👗</h2>
      <p>Trending Fashion</p>
      <button>Explore</button>
    </div>
  </div>

  <div class="slide" style="background-image:url('https://picsum.photos/id/1018/1200/600')">
    <div class="overlay">
      <h2>Men's Wear 👔</h2>
      <p>Latest Style</p>
      <button>Shop</button>
    </div>
  </div>

  <div class="slide" style="background-image:url('https://picsum.photos/id/1020/1200/600')">
    <div class="overlay">
      <h2>Kids Zone 🧸</h2>
      <p>Best for Kids</p>
      <button>Buy Now</button>
    </div>
  </div>
  <div class="slide" style="background-image:url('https://picsum.photos/id/1024/1200/600')">
    <div class="overlay">
      <h2>Beauty Deals 💄</h2>
      <p>Special Offers</p>
      <button>Check</button>
    </div>
  </div>
</div>
<div class="grid" id="products"></div>  
<footer>
<p>© 2026 MyShop E‑commerce Demo</p>
<p>Follow us | Facebook | Instagram | Twitter</p>
</footer>
<script>

/* slider only */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(()=>{
slides.forEach(s=>s.classList.remove("active"));
index = (index + 1) % slides.length;
slides[index].classList.add("active");
},3000);
</script>
</body>
</html>
