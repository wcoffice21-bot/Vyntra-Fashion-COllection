<!DOCTYPE html>
<html>
<head>
<title>Products</title>

<link rel="stylesheet" href="../css/style.css">
<script src="../js/app.js" defer></script>
<style>
  
  .filter-bar{
display:flex;
justify-content:space-between;
padding:15px;
gap:10px;
background:#fff;
}

.filter-bar input,
.filter-bar select{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
width:100%;
max-width:200px;
}

.card{
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* BADGE */
.price{
color:#ff4d4d;
font-weight:bold;
}

/* BUTTON */
.buy-btn{
background:#ff4d4d;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

.buy-btn:hover{
background:#e60000;
}
/* HEADER */
.main-header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
background:#111;
color:white;
position:sticky;
top:0;
z-index:1000;
}

/* LOGO */
.logo-box{
display:flex;
align-items:center;
gap:10px;
}

.logo{
height:40px;
}

.logo-text{
font-size:18px;
font-weight:bold;
color:#ffcc00;
}

/* SEARCH */
.search-box{
flex:1;
margin:0 20px;
}

.search-box input{
width:100%;
padding:8px 12px;
border-radius:20px;
border:none;
outline:none;
}

/* NAV */
.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:500;
transition:0.3s;
}

.nav-links a:hover{
color:#ffcc00;
}

/* RIGHT */
.header-right{
display:flex;
align-items:center;
gap:15px;
}

.cart{
cursor:pointer;
}

.login-btn{
background:#ff4d4d;
padding:6px 12px;
border-radius:5px;
color:white;
text-decoration:none;
}

.login-btn:hover{
background:#e60000;
}

/* MOBILE */
.menu-toggle{
display:none;
font-size:22px;
cursor:pointer;
}

@media(max-width:768px){

.nav-links{
position:absolute;
top:60px;
right:0;
background:#111;
flex-direction:column;
width:200px;
display:none;
padding:15px;
}

.nav-links.show{
display:flex;
}

.menu-toggle{
display:block;
}

.search-box{
display:none;
}

}
@media(max-width:768px){

.main-header{
flex-direction:column;
align-items:flex-start;
}

.search-box{
width:100%;
margin:10px 0;
}

.nav-links{
display:none;
flex-direction:column;
width:100%;
}

.nav-links.show{
display:flex;
}

}
img{
max-width:100%;
height:auto;
}
body{
overflow-x:hidden;
}

.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:#fff;
}

.cat{
padding:8px 12px;
background:#f5f5f5;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
font-size:14px;
}

.cat:hover{
background:#ff4d4d;
color:white;
}

.old{
text-decoration:line-through;
color:gray;
font-size:12px;
margin-left:5px;
}

.rating{
color:gold;
font-size:14px;
margin:5px 0;
}

.view-btn{
background:#333;
color:white;
border:none;
padding:6px;
margin-top:5px;
cursor:pointer;
border-radius:5px;
}

</style>
</head>
<body>
	<header class="main-header">
  <!-- LOGO -->
  <div class="logo-box">
    <img src="images/logo.png" class="logo">
    <span class="logo-text">Vyntra Fashion Collection</span>
  </div>

  <!-- SEARCH -->
  <div class="search-box">
    <input type="text" id="searchBox" placeholder="Search products...">
  </div>

  <!-- NAV -->
  <nav class="nav-links" id="navLinks">
    <a href="../index.html">Home</a>
    <a href="products.html">Shop</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html">Cart 🛒</a> <!-- ✅ NEW -->
  </nav>

  <!-- RIGHT SIDE -->
  <div class="header-right">
    <span class="cart">🛒 <span id="cart-count">0</span></span>
    <a href="login.html" class="login-btn">Login</a>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  </div>

</header>

<div class="categories">

  <div class="cat" onclick="filterCategory('all')">All</div>
  <div class="cat" onclick="filterCategory('men')">👕 Men</div>
  <div class="cat" onclick="filterCategory('women')">👗 Women</div>
  <div class="cat" onclick="filterCategory('kids')">👦 Kids</div>
  <div class="cat" onclick="filterCategory('winter')">🧥 Winter</div>
  <div class="cat" onclick="filterCategory('jeans')">👖 Jeans</div>
  <div class="cat" onclick="filterCategory('tops')">👚 Tops</div>
  <div class="cat" onclick="filterCategory('new')">🆕 New</div>
  <div class="cat" onclick="filterCategory('sale')">🔥 Sale</div>

</div>
<!-- FILTER BAR -->
<div class="filter-bar">
<input type="text" id="searchBox2" placeholder="Search products...">
<select id="sort">
<option value="">Sort By</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
</select>
</div>

<!-- PRODUCTS -->
<div class="grid" id="products"></div>
<div class="trust">

  <p>✔️ 100% Original</p>
  <p>✔️ Easy Return</p>
  <p>✔️ Cash on Delivery</p>
  <p>✔️ Fast Delivery</p>
</div>
<footer>
<p>© 2026 Vyntra Fashion Collection</p>
</footer>
<script>
function showDetails(id){

 let products = JSON.parse(localStorage.getItem("products"));

if(!products){
 products = [];
}
}
 

 let products = JSON.parse(localStorage.getItem("products")) || [
 {id:1,name:"Banarasi Saree",price:1500,oldPrice:2000,category:"women",image:"../images/saree.jpg"},
 {id:2,name:"Men Shirt",price:800,category:"men",image:"../images/shirt.jpg"},
 {id:3,name:"Kids Dress",price:600,category:"kids",image:"../images/kids.jpg"},
];

let filteredProducts = [...products];

// SEARCH
let search = document.getElementById("searchBox");
if(search){
 search.addEventListener("input", function(){
  let value = this.value.toLowerCase();

  filteredProducts = products.filter(p =>
   p.name.toLowerCase().includes(value)
  );

  showProducts(filteredProducts);
 });
}

// CATEGORY
function filterCategory(cat){
 if(cat === "all"){
  showProducts(products);
  return;
 }

 let filtered = products.filter(p => p.category === cat);
 showProducts(filtered);
}

// VIEW PRODUCT
function viewProduct(id){
 let product = products.find(p => p.id == id);

 localStorage.setItem("viewProduct", JSON.stringify(product));
 window.location.href = "product-detail.html";
}

// LOAD
window.onload = () => {
 showProducts(products);
};

function showProducts(data){
 let grid = document.getElementById("products");

 if(data.length === 0){
  grid.innerHTML = "<h3>No Products Found 😢</h3>";
  return;
 }

 let html = "";

 data.forEach(p=>{
  html += `
  <div class="card">

    <img src="${p.image}" onclick="viewProduct(${p.id})">

    <h3>${p.name}</h3>

    <p class="price">
      ₹${p.price}
      ${p.oldPrice ? `<span class="old">₹${p.oldPrice}</span>` : ""}
    </p>

    <div class="rating">⭐⭐⭐⭐☆</div>

    <button onclick="addCart(${p.id})">Add to Cart</button>

    <button onclick="viewProduct(${p.id})">Quick View</button>

  </div>
  `;
 });

 grid.innerHTML = html;
}

function addCart(id){
 alert("Product added to cart 🛒");
}

function toggleMenu(){
 let nav = document.getElementById("navLinks");
 nav.classList.toggle("show");
}


let search2 = document.getElementById("searchBox2");

if(search2){
 search2.addEventListener("input", function(){
  let value = this.value.toLowerCase();

  filteredProducts = products.filter(p =>
   p.name.toLowerCase().includes(value)
  );

  showProducts(filteredProducts);
 });
}
</script>
</body>
</html>
