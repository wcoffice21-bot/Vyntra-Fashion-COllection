<!DOCTYPE html>
<html>
<head>
<title>My Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 font-family:Arial;
 background:#f5f5f5;
 margin:0;
}

.header{
 background:#2874f0;
 color:white;
 padding:15px;
 text-align:center;
}

.container{
 max-width:900px;
 margin:auto;
 padding:15px;
}

.order{
 background:white;
 padding:15px;
 margin-bottom:10px;
 border-radius:10px;
}

.order h3{
 margin:0 0 5px 0;
}

@media(max-width:600px){
 .order{
  font-size:14px;
 }
}
</style>
</head>

<body>

<div class="header">📦 My Orders</div>

<div class="container" id="orders"></div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let html="";

orders.forEach(o=>{

 html += `
 <div class="order">
   <h3>🧾 Order</h3>
   <p><b>Date:</b> ${o.date}</p>
   <p><b>Total:</b> ₹${o.amount}</p>
   <p><b>Items:</b> ${o.items.length}</p>
 </div>
 `;
});

document.getElementById("orders").innerHTML =
 html || "<h3>No Orders Yet 😢</h3>";

</script>

</body>
</html>
